    <h1 id="1-下载镜像"><a href="#1-下载镜像" class="headerlink" title="1 下载镜像"></a>1 下载镜像</h1><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">docker search redis</span><br><span class="line">docker pull redis</span><br></pre></td></tr></table></figure>
<h1 id="2-使用镜像"><a href="#2-使用镜像" class="headerlink" title="2 使用镜像"></a>2 使用镜像</h1><ul>
<li>运行容器</li>
</ul>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">docker run -p 6379:6379 -v D:\DockerDesktop\data\redisData:/data  -d redis redis-server --appendonly yes</span><br><span class="line"></span><br><span class="line">-p 6379:6379 将容器的6379端口映射到主机的6379端口</span><br><span class="line">-v D:\DockerDesktop\data\redisData:/data 将主机中D:\DockerDesktop\data\redisData目录挂载到容器的/data，做数据持久化</span><br><span class="line">redis-server --appendonly yes 在容器执行redis-server启动命令，并打开redis持久化配置</span><br></pre></td></tr></table></figure>
<ul>
<li>连接，查看容器</li>
</ul>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">docker <span class="built_in">exec</span> -it 43f7a65ec7f8 redis-cli</span><br></pre></td></tr></table></figure>
